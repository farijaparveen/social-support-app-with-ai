<header class="site-header" role="banner">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-emblem" aria-hidden="true">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="17" stroke="currentColor" stroke-width="1.5"/>
          <path d="M18 8 L18 28 M8 18 L28 18" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="18" cy="18" r="5" fill="currentColor" opacity="0.2"/>
          <circle cx="18" cy="18" r="2" fill="currentColor"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1 class="brand-title">{{ t.t('APP_TITLE') }}</h1>
        <p class="brand-subtitle">{{ t.t('APP_SUBTITLE') }}</p>
      </div>
    </div>
    <button
      class="lang-toggle"
      (click)="t.toggle()"
      [attr.aria-label]="t.language() === 'en' ? 'Switch to Arabic' : 'Switch to English'"
    >
      {{ t.language() === 'en' ? t.t('TOGGLE_ARABIC') : t.t('TOGGLE_ENGLISH') }}
    </button>
  </div>
</header>
